apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-test
  namespace: aws-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aws-test
  template:
    metadata:
      labels:
        app: aws-test
    spec:
      containers:
        - name: aws-test
          image: aws-test:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/people
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: people123
---
apiVersion: v1
kind: Service
metadata:
  name: aws-test
  namespace: aws-test
spec:
  selector:
    app: aws-test
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
